_format_version: "3.0"
services:
  - name: fastapi-backend
    url: http://api-service:7999  
    routes:
      - name: all-routes
        paths:
          - /
    plugins:
      - name: rate-limiting
        config:
          minute: 100               # Allows 100 requests per minute
          policy: local
      - name: request-size-limiting
        config:
          allowed_payload_size: 1   # Limit set to 1 Megabyte
          #size_unit: bytes         # Change unit to bytes